name: service-b
type: backend-service
language: java
framework: spring-boot
domain: profile-notifications

build_commands:
  - ./gradlew build

test_commands:
  - ./gradlew test

migration_paths:
  - src/main/resources/db/migration

api_contracts:
  - openapi.yaml

entrypoints:
  - src/main/java/com/example/serviceb/controller
  - src/main/java/com/example/serviceb/service
  - src/main/java/com/example/serviceb/dto

owns_entities:
  - NotificationPreference
  - CommunicationPreference
  - ProfileEvent

owns_fields:
  - smsOptIn
  - emailOptIn
  - notificationChannel
  - contactPreference

owns_tables:
  - notification_preference
  - communication_preference

api_keywords:
  - notification preferences
  - communication settings
  - profile events
  - preference sync
  - customer notifications